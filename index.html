<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exam Flashcards - Grade 9</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            color: #bb86fc;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #aaaaaa;
            margin-bottom: 30px;
            text-align: center;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background-color: #333333;
            color: white;
            font-size: 16px;
            outline: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #444444;
        }
        button.primary {
            background-color: #bb86fc;
            color: #000;
            font-weight: bold;
        }
        button.primary:hover {
            background-color: #9965f4;
        }
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            max-width: 400px;
            height: 250px;
            margin-bottom: 20px;
        }
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-radius: 16px;
        }
        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }
        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 16px;
            text-align: center;
        }
        .flashcard-front {
            background-color: #1e1e1e;
            border: 2px solid #333333;
        }
        .flashcard-back {
            background-color: #bb86fc;
            color: #121212;
            transform: rotateY(180deg);
        }
        .category-label {
            position: absolute;
            top: 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }
        .card-content {
            font-size: 20px;
            font-weight: 500;
            line-height: 1.4;
        }
        .card-counter {
            color: #888888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <h1>AI Flashcards</h1>
    <p class="subtitle">Grade 9 Syllabus (Part A & Part B)</p>

    <div class="controls">
        <select id="category-select">
            <option value="all">All Topics</option>
            <option value="part-a">Part A: Employability Skills</option>
            <option value="part-b">Part B: AI Skills</option>
        </select>
        <button id="shuffle-btn">Shuffle</button>
    </div>

    <div class="card-counter"><span id="current-idx">1</span> / <span id="total-cards">0</span></div>

    <div class="flashcard-container" id="flashcard-container">
        <div class="flashcard" id="flashcard">
            <div class="flashcard-face flashcard-front">
                <div class="category-label" id="front-category">Category</div>
                <div class="card-content" id="front-content">Question goes here</div>
                <div style="position: absolute; bottom: 15px; font-size: 12px; opacity: 0.5;">Tap to flip</div>
            </div>
            <div class="flashcard-face flashcard-back">
                <div class="category-label" style="color: rgba(0,0,0,0.6);">Answer</div>
                <div class="card-content" id="back-content">Answer goes here</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prev-btn">← Prev</button>
        <button id="next-btn" class="primary">Next →</button>
    </div>

    <script>
        const allCards = [
            // Part A
            { q: "What are the 7 Cs of Communication?", a: "Clear, Concise, Concrete, Correct, Coherent, Complete, Courteous", cat: "part-a", catLabel: "Communication Skills" },
            { q: "What is feedback in communication?", a: "The receiver's response back to the sender, completing the cycle.", cat: "part-a", catLabel: "Communication Skills" },
            { q: "Define Emotional Intelligence (EQ).", a: "Ability to understand and manage own emotions, and understand others' emotions.", cat: "part-a", catLabel: "Self-Management Skills" },
            { q: "What is the difference between RAM and ROM?", a: "RAM is volatile (temporary). ROM is non-volatile (permanent).", cat: "part-a", catLabel: "ICT Skills" },
            { q: "Name 3 qualities of an entrepreneur.", a: "Risk-taker, innovative, hardworking, confident.", cat: "part-a", catLabel: "Entrepreneurial Skills" },
            { q: "What is Sustainable Development?", a: "Progress that meets present needs without harming future generations.", cat: "part-a", catLabel: "Green Skills" },
            
            // Part B
            { q: "Define Artificial Intelligence.", a: "A machine's ability to perform cognitive functions as humans do, such as perceiving, learning, reasoning and solving problems.", cat: "part-b", catLabel: "Intro to AI" },
            { q: "What are the 3 domains of AI?", a: "Data, Computer Vision (CV), and Natural Language Processing (NLP).", cat: "part-b", catLabel: "Intro to AI" },
            { q: "What are the stages of the AI Project Cycle?", a: "Problem Scoping, Data Acquisition, Data Exploration, Modelling, Evaluation.", cat: "part-b", catLabel: "AI Project Cycle" },
            { q: "What is the 4Ws Canvas in Problem Scoping?", a: "Who, What, Where, and Why.", cat: "part-b", catLabel: "AI Project Cycle" },
            { q: "What is Data Literacy?", a: "The ability to read, understand, create, and communicate data as information.", cat: "part-b", catLabel: "Data Literacy" },
            { q: "What is the difference between mean, median, and mode?", a: "Mean = average. Median = middle value. Mode = most frequent value.", cat: "part-b", catLabel: "Math for AI" },
            { q: "What is Generative AI?", a: "AI that can generate new content (text, images, audio) based on learned patterns (e.g., ChatGPT, Midjourney).", cat: "part-b", catLabel: "Generative AI" },
            { q: "What are variables in Python?", a: "Containers for storing data values.", cat: "part-b", catLabel: "Intro to Python" },
            { q: "How do you print 'Hello' in Python?", a: "print('Hello')", cat: "part-b", catLabel: "Intro to Python" },
            { q: "What is a Neural Network?", a: "A computer system modeled on the human brain and nervous system, using nodes (artificial neurons).", cat: "part-b", catLabel: "Neural Networks" }
        ];

        let currentCards = [...allCards];
        let currentIndex = 0;

        const flashcard = document.getElementById('flashcard');
        const frontContent = document.getElementById('front-content');
        const backContent = document.getElementById('back-content');
        const frontCategory = document.getElementById('front-category');
        const idxDisplay = document.getElementById('current-idx');
        const totalDisplay = document.getElementById('total-cards');

        function updateCard() {
            if (currentCards.length === 0) return;
            
            // Remove flip if active
            flashcard.classList.remove('is-flipped');
            
            setTimeout(() => {
                const card = currentCards[currentIndex];
                frontContent.textContent = card.q;
                backContent.textContent = card.a;
                frontCategory.textContent = card.catLabel;
                
                idxDisplay.textContent = currentIndex + 1;
                totalDisplay.textContent = currentCards.length;
            }, 150); // wait for unflip animation
        }

        flashcard.addEventListener('click', () => {
            flashcard.classList.toggle('is-flipped');
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentIndex < currentCards.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                currentIndex = 0; // Loop back
                updateCard();
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            } else {
                currentIndex = currentCards.length - 1; // Loop to end
                updateCard();
            }
        });

        document.getElementById('shuffle-btn').addEventListener('click', () => {
            for (let i = currentCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
            }
            currentIndex = 0;
            updateCard();
        });

        document.getElementById('category-select').addEventListener('change', (e) => {
            const val = e.target.value;
            if (val === 'all') {
                currentCards = [...allCards];
            } else {
                currentCards = allCards.filter(c => c.cat === val);
            }
            currentIndex = 0;
            updateCard();
        });

        // Initialize
        updateCard();
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') document.getElementById('next-btn').click();
            if (e.key === 'ArrowLeft') document.getElementById('prev-btn').click();
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                flashcard.click();
            }
        });
    </script>
</body>
</html>
